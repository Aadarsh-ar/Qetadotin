    }

      "url": "https://qeta.in"

    <!-- Critical CSS for above-the-fold content to reduce render-blocking -->
    <style>
      /* Critical layout and hero styles */
      *,::before,::after{box-sizing:border-box;border:0 solid}

      body{margin:0;line-height:inherit}
      #root{min-height:100vh}
      
      /* Navigation critical styles */
      nav{position:fixed;top:0;left:0;right:0;z-index:50}
      
      /* Hero section critical styles */
      .gradient-hero-bg{background:linear-gradient(135deg,hsl(210 100% 95%/0.6),hsl(280 60% 95%/0.4),hsl(20 100% 95%/0.3))}
      .min-h-screen{min-height:100vh}
      .flex{display:flex}
      .items-center{align-items:center}
      .justify-center{justify-content:center}
      .relative{position:relative}
      .text-center{text-align:center}
      .container-wide{width:100%;max-width:1400px;margin:0 auto}
      
      /* Prevent FOUC */
      .opacity-0{opacity:0}
    </style>
